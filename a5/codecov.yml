# Three CI jobs upload coverage (flags: backend, ml, mobile). Wait for all before
# notifying so the dashboard and PR comment include every component.
codecov:
  notify:
    after_n_builds: 3

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  backend:
    paths:
      - backend/app/
    carryforward: true
  ml:
    paths:
      - ml/
    carryforward: true
  mobile:
    paths:
      - mobile/app/
      - mobile/services/
    carryforward: true

# Jest writes SF: paths relative to mobile/ (e.g. app/camera.tsx). Map them under mobile/.
fixes:
  - "^app/::mobile/app/"
  - "^services/::mobile/services/"
