apiVersion: apps/v1
kind: Deployment
metadata:
  name: eyehearu-api
  namespace: eyehearu
  labels:
    app: eyehearu-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eyehearu-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: eyehearu-api
    spec:
      containers:
        - name: api
          image: eyehearu-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: PIPELINE_ENV
              value: "production"
            - name: AWS_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: eyehearu-config
                  key: s3-bucket
            - name: AWS_S3_MODEL_KEY
              valueFrom:
                configMapKeyRef:
                  name: eyehearu-config
                  key: model-s3-key
            - name: LABEL_MAP_PATH
              value: "/app/ml/i3d_label_map_mvp-sft-full-v1.json"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
