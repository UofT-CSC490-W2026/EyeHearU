# Docker Compose for local development
# Usage: docker-compose up --build

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./ml/i3d_msft:/app/ml/i3d_msft
      - model_cache:/app/model_cache
    environment:
      - DEBUG=true
      - MODEL_PATH=/app/model_cache/best_model.pt
      - LABEL_MAP_PATH=/app/ml/i3d_label_map_mvp-sft-full-v1.json
      - MODEL_DEVICE=cpu
      - AWS_S3_BUCKET=eye-hear-u-public-data-ca1
      - AWS_S3_REGION=ca-central-1
    env_file:
      - backend/.env

volumes:
  model_cache:
