apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

# The image name `eyehearu-api` in deployment.yaml is overridden here with the
# full ECR URI.  Before applying, update `newName` and `newTag` to match your
# ECR repository (output of `terraform output ecr_api_repo_url`) and the
# desired image tag, or run:
#
#   kustomize edit set image eyehearu-api=<account_id>.dkr.ecr.ca-central-1.amazonaws.com/eye-hear-u-prod-backend-api:<git-sha>
#   kubectl apply -k infrastructure/k8s/
images:
  - name: eyehearu-api
    newName: ACCOUNT_ID.dkr.ecr.ca-central-1.amazonaws.com/eye-hear-u-prod-backend-api
    newTag: latest
