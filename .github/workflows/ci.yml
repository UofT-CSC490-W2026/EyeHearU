# Backend, ML, and mobile tests + coverage.
# Uploads coverage.xml for Codecov PR comments & README badge.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term --cov-fail-under=100

      - name: Upload coverage report (Codecov)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: backend
          name: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary (job summary)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "## Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --precision=2 >> "$GITHUB_STEP_SUMMARY"

  ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=100

      - name: Upload coverage report (Codecov)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: ml
          name: ml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary (job summary)
        run: |
          echo "## ML coverage" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --precision=2 >> "$GITHUB_STEP_SUMMARY"

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npx jest --coverage --ci

      - name: Upload coverage report (Codecov)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          # Jest writes lcov here; Codecov runs from the workspace root, so this path is from repo root
          files: mobile/coverage/lcov.info
          flags: mobile
          name: mobile
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Test summary (job summary)
        if: always()
        run: |
          echo "## Mobile test results" >> "$GITHUB_STEP_SUMMARY"
          echo "See job log for detailed Jest output." >> "$GITHUB_STEP_SUMMARY"
