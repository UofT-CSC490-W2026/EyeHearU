# Backend tests + coverage (pytest-cov). Uploads coverage.xml for Codecov PR comments & README badge.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term --cov-fail-under=100

      - name: Upload coverage report (Codecov)
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary (job summary)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "## Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --precision=2 >> "$GITHUB_STEP_SUMMARY"
